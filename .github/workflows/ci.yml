name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # --- Structural Tests (pwsh available on both OSes) ---
      - name: Run agent structure tests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File "tests/structural/test-agents-structure.ps1"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run skill structure tests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File "tests/structural/test-skills-structure.ps1"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # --- JS hook tests (Node's built-in test runner) ---
      # Node's --test expands glob patterns natively (since Node 21), so this
      # works identically on Windows and Ubuntu without relying on shell globbing
      # (`node --test <dir>/` is unreliable on Windows).
      - name: Run JS hook tests
        run: node --test "tests/hooks/**/*.test.js"

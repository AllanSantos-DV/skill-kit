name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # --- Structural Tests (pwsh available on both OSes) ---
      - name: Run agent structure tests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File "tests/structural/test-agents-structure.ps1"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run skill structure tests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File "tests/structural/test-skills-structure.ps1"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # Hook tests (PS1/SH) were removed — hooks migrated to JS (Node.js only).
      # JS hook tests run via: node tests/hooks/<name>.test.js (not yet in CI)
